spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/procel_analytics}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

procel:
  rooms:
    source: cobalto # cobalto | resource
    resource-path: seed/cobalto-compartimentos.sample.json
  sensors:
    seed-path: seed/sensors/sensors.seed.json

  cors:
    allowed-origin-patterns: ${PROCEL_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.16.*.*:*,http://172.17.*.*:*,http://172.18.*.*:*,http://172.19.*.*:*,http://172.20.*.*:*,http://172.21.*.*:*,http://172.22.*.*:*,http://172.23.*.*:*,http://172.24.*.*:*,http://172.25.*.*:*,http://172.26.*.*:*,http://172.27.*.*:*,http://172.28.*.*:*,http://172.29.*.*:*,http://172.30.*.*:*,http://172.31.*.*:*}

  security:
    jwt:
      secret: ${PROCEL_JWT_SECRET:change-this-local-development-secret-32chars}
      expiration-minutes: ${PROCEL_JWT_EXPIRATION_MINUTES:60}
    bootstrap-admin:
      enabled: ${PROCEL_BOOTSTRAP_ADMIN_ENABLED:true}
      user-id: ${PROCEL_BOOTSTRAP_ADMIN_USER_ID:admin}
      nome: ${PROCEL_BOOTSTRAP_ADMIN_NOME:Administrador PROCEL}
      email: ${PROCEL_BOOTSTRAP_ADMIN_EMAIL:admin@procel.local}
      password: ${PROCEL_BOOTSTRAP_ADMIN_PASSWORD:admin123}

  cobalto:
    rooms:
      url: https://cobalto.ufpel.edu.br/servicosgerais/consultas/salasDeAula/listaSalas/
      timeout-ms: 60000
      page-size: 800
      php-sessid: ""   # opcional (se precisar)
