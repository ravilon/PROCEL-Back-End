spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/procel_analytics
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

      jakarta:
        persistence:
          schema-generation:
            database:
              action: create-drop
            scripts:
              action: create
              create-target: target/schema.sql
            create-source: metadata

logging:
  level:
    org.hibernate.SQL: debug

procel:
  rooms:
    source: cobalto # cobalto | resource
    resource-path: seed/cobalto-compartimentos.sample.json
  sensors:
    seed-path: seed/sensors/sensors.seed.json

  security:
    jwt:
      secret: ${PROCEL_JWT_SECRET:change-this-local-development-secret-32chars}
      expiration-minutes: ${PROCEL_JWT_EXPIRATION_MINUTES:60}
    bootstrap-admin:
      enabled: ${PROCEL_BOOTSTRAP_ADMIN_ENABLED:true}
      user-id: ${PROCEL_BOOTSTRAP_ADMIN_USER_ID:admin}
      nome: ${PROCEL_BOOTSTRAP_ADMIN_NOME:Administrador PROCEL}
      email: ${PROCEL_BOOTSTRAP_ADMIN_EMAIL:admin@procel.local}
      password: ${PROCEL_BOOTSTRAP_ADMIN_PASSWORD:admin123}

  cobalto:
    rooms:
      url: https://cobalto.ufpel.edu.br/servicosgerais/consultas/salasDeAula/listaSalas/
      timeout-ms: 60000
      page-size: 1000
      php-sessid: ""   # opcional (se precisar)
