name: procel-ingestion

services:
  postgres:
    image: postgres:16
    container_name: procel-ingestion-postgres
    environment:
      POSTGRES_DB: procel_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: