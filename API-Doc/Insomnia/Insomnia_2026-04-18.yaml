          modified: 1776477181099
          sortKey: -1776477176820
          description: ""
        children:
          - url: "{{baseUrl}}/actuator/health"
            name: Set fromIso/toIso (last 10 minutes)
            meta:
              id: req_0986154187fa42f7978b7298b99f843b
              created: 1776477181101
              modified: 1776477181101
              isPrivate: false
              description: ""
              sortKey: -1776477176819
            method: GET
            scripts:
              preRequest: >-
                // Define janela de consulta: últimos 10 minutos

                const to = new Date();

                const from = new Date(to.getTime() - 10*60*1000);

                insomnia.collectionVariables.set('toIso',
                to.toISOString().replace(/\.\d{3}Z$/, 'Z'));

                insomnia.collectionVariables.set('fromIso',
                from.toISOString().replace(/\.\d{3}Z$/, 'Z'));


                console.log('fromIso=',
                insomnia.collectionVariables.get('fromIso'));

                console.log('toIso=',
                insomnia.collectionVariables.get('toIso'));
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
