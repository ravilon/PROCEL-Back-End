              created: 1776553373001
              modified: 1776553373001
              isPrivate: false
              description: ""
              sortKey: -1776477176818.4
            method: POST
            body:
              mimeType: text/plain
              text: |-
                {
                  "email": "{{adminEmail}}",
                  "password": "{{adminPassword}}"
                }
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              afterResponse: >-
                insomnia.test('Status 200', function () {
                insomnia.response.to.have.status(200); });

                const data = insomnia.response.json();

                insomnia.test('Has accessToken', function () {
                insomnia.expect(data.accessToken).to.be.ok; });

                insomnia.collectionVariables.set('jwtToken', data.accessToken);

                console.log('jwtToken saved');
